name: Client build

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
      - testBuild

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: List some stuff v1
        run: dpkg-query -Wf '${Installed-Size}\t${Package}\n' | sort -n | tail -n 100
      - name: Cleanup some stuff v1
        run: rm -rf /opt/hostedtoolcache
      - name: Cleanup some stuff v2
        run: sudo apt-get remove -y '^dotnet-.*'
      - name: Cleanup some stuff v3
        run: sudo apt-get remove -y '^llvm-.*'
      - name: Cleanup some stuff v4
        run: sudo apt-get remove -y 'php.*'
      - name: Cleanup some stuff v5
        run: sudo apt-get remove -y '^aspnetcore.*'
      - name: Cleanup some stuff v6
        run: sudo apt-get remove -y 'gcc.*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_ACTOR }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Pull base image
        run: docker pull ghcr.io/epicgames/unreal-engine:dev-5.3.2
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag beamable-unreal-client:$(date +%s)